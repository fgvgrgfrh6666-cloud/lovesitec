<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You Heart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23ff78a0" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 12 12, auto;
      opacity: 0;
      animation: fadeIn 1.5s ease-out forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    a, button {
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="%23ffd1dc" stroke="%23ff78a0" stroke-width="1" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 14 14, pointer;
    }

    #heart {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .word {
      position: absolute;
      color: #ffd1dc;
      font-size: 16px;
      font-weight: 600;
      text-shadow:
        0 0 6px rgba(255, 180, 200, 0.8),
        0 0 12px rgba(255, 120, 160, 0.5);
      user-select: none;
      white-space: nowrap;
      animation: glow 6s linear infinite;
    }

    @keyframes glow {
      0% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
      50% {
        opacity: 0;
        transform: scale(0.72) translateY(-8px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* ===== SIDEBAR STYLES ===== */

    .sidebar-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, rgba(255, 120, 160, 0.2), rgba(255, 180, 200, 0.15));
      border: 2px solid rgba(255, 180, 200, 0.4);
      border-radius: 16px;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="%23ffd1dc" stroke="%23ff78a0" stroke-width="1" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 14 14, pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(255, 120, 160, 0.15);
    }

    .sidebar-toggle:hover {
      background: linear-gradient(135deg, rgba(255, 120, 160, 0.35), rgba(255, 180, 200, 0.25));
      border-color: rgba(255, 180, 200, 0.7);
      box-shadow: 0 6px 30px rgba(255, 120, 160, 0.35), 0 0 20px rgba(255, 120, 160, 0.2);
      transform: translateY(-2px);
    }

    .sidebar-toggle span {
      display: block;
      width: 24px;
      height: 2.5px;
      background: linear-gradient(90deg, #ffb0c8, #ffd1dc);
      border-radius: 3px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 3px rgba(255, 120, 160, 0.3);
    }

    .sidebar-toggle.active {
      background: linear-gradient(135deg, rgba(255, 120, 160, 0.4), rgba(255, 180, 200, 0.3));
    }

    .sidebar-toggle.active span:nth-child(1) {
      transform: translateY(7.5px) rotate(45deg);
    }

    .sidebar-toggle.active span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .sidebar-toggle.active span:nth-child(3) {
      transform: translateY(-7.5px) rotate(-45deg);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      height: 100vh;
      background: linear-gradient(180deg, rgba(15, 8, 12, 0.95), rgba(10, 5, 8, 0.92));
      backdrop-filter: blur(20px);
      border-right: 2px solid rgba(255, 180, 200, 0.2);
      box-shadow: 4px 0 40px rgba(255, 120, 160, 0.15);
      z-index: 999;
      transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow-y: auto;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 80px 30px 35px;
      text-align: center;
      border-bottom: 2px solid rgba(255, 180, 200, 0.15);
      background: linear-gradient(180deg, rgba(255, 120, 160, 0.08), transparent);
    }

    .sidebar-header .heart-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
      animation: pulseHeart 2s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255, 120, 160, 0.6));
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .sidebar-header h2 {
      color: #ffd1dc;
      font-size: 26px;
      font-weight: 700;
      text-shadow: 0 0 16px rgba(255, 120, 160, 0.7), 0 2px 8px rgba(255, 120, 160, 0.4);
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .sidebar-header p {
      color: rgba(255, 180, 200, 0.7);
      font-size: 14px;
      font-style: italic;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }

    .sidebar-content {
      flex: 1;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: linear-gradient(135deg, rgba(255, 120, 160, 0.08), rgba(255, 180, 200, 0.04));
      border: 1.5px solid rgba(255, 180, 200, 0.15);
      border-radius: 14px;
      color: rgba(255, 210, 225, 0.9);
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="%23ffd1dc" stroke="%23ff78a0" stroke-width="1" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 14 14, pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 15px;
      position: relative;
      overflow: hidden;
    }

    .sidebar-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 180, 200, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .sidebar-item:hover::before {
      left: 100%;
    }

    .sidebar-item:hover {
      background: linear-gradient(135deg, rgba(255, 120, 160, 0.18), rgba(255, 180, 200, 0.12));
      border-color: rgba(255, 180, 200, 0.4);
      transform: translateX(6px) scale(1.02);
      box-shadow: 0 4px 20px rgba(255, 120, 160, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      color: #ffd1dc;
    }

    .sidebar-item .icon {
      font-size: 24px;
      width: 36px;
      text-align: center;
      filter: drop-shadow(0 2px 4px rgba(255, 120, 160, 0.4));
      transition: transform 0.3s ease;
    }

    .sidebar-item:hover .icon {
      transform: scale(1.15) rotate(-5deg);
    }

    .sidebar-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 180, 200, 0.3), transparent);
      margin: 10px 0;
      box-shadow: 0 1px 4px rgba(255, 120, 160, 0.2);
    }

    .sidebar-footer {
      padding: 25px 25px 30px;
      text-align: center;
      border-top: 2px solid rgba(255, 180, 200, 0.15);
      background: linear-gradient(0deg, rgba(255, 120, 160, 0.05), transparent);
    }

    .sidebar-footer p {
      color: rgba(255, 180, 200, 0.5);
      font-size: 12px;
      line-height: 1.8;
    }

    .sidebar-footer .glow-text {
      color: rgba(255, 160, 190, 0.8);
      font-size: 16px;
      letter-spacing: 3px;
      font-weight: 600;
      text-shadow: 0 0 12px rgba(255, 120, 160, 0.6), 0 2px 6px rgba(255, 120, 160, 0.4);
      display: block;
      margin-bottom: 8px;
    }

    /* Overlay */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .sidebar-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* Scrollbar styling */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: rgba(255, 120, 160, 0.05);
      border-radius: 10px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(255, 120, 160, 0.4), rgba(255, 180, 200, 0.3));
      border-radius: 10px;
      transition: background 0.3s ease;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(255, 120, 160, 0.6), rgba(255, 180, 200, 0.5));
    }

    /* Responsive */
    @media (max-width: 480px) {
      .sidebar {
        width: 280px;
      }
      .sidebar-header {
        padding: 70px 20px 25px;
      }
      .sidebar-content {
        padding: 20px 18px;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar Toggle Button -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="heart-icon">💖</span>
      <h2>For You</h2>
      <p>Every beat of my heart</p>
    </div>

    <div class="sidebar-content">
      <div class="sidebar-item">
        <span class="icon">💌</span>
        <span>A message from the heart</span>
      </div>
      <div class="sidebar-item">
        <span class="icon">🌸</span>
        <span>You make life beautiful</span>
      </div>
      <div class="sidebar-item">
        <span class="icon">✨</span>
        <span>You are my everything</span>
      </div>
      <div class="sidebar-item">
        <span class="icon">🌙</span>
        <span>Thinking of you always</span>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-item">
        <span class="icon">🎵</span>
        <span>Our song</span>
      </div>
      <div class="sidebar-item">
        <span class="icon">📸</span>
        <span>Beautiful memories</span>
      </div>
      <div class="sidebar-item">
        <span class="icon">💫</span>
        <span>Forever and always</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <p class="glow-text">💕 I love you 💕</p>
      <p>more than words can say</p>
    </div>
  </div>

  <div id="heart"></div>

  <script>
    // ===== HEART ANIMATION =====

    const container = document.getElementById("heart");
    const text = "I love you";

    function createHeart() {
      container.innerHTML = "";

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const scale = Math.min(window.innerWidth, window.innerHeight) / 45;

      for (let t = 0; t < Math.PI * 2; t += 0.08) {
        // Heart equation
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y =
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t);

        const span = document.createElement("span");
        span.className = "word";
        span.textContent = text;

        span.style.left = `${centerX + x * scale - 40}px`;
        span.style.top = `${centerY - y * scale - 10}px`;

        span.style.color = `rgb(255, 190, 210)`;
        const delay = ((Math.PI * 2 - t) / (Math.PI * 2)) * 6;
        span.style.animationDelay = `-${delay}s`;
        span.style.textShadow = `0 0 8px rgba(255, 170, 200, 0.9), 0 0 18px rgba(255, 120, 180, 0.7)`;

        container.appendChild(span);
      }
    }

    createHeart();
    window.addEventListener("resize", createHeart);

    // ===== SIDEBAR TOGGLE =====

    const sidebar = document.getElementById("sidebar");
    const sidebarToggle = document.getElementById("sidebarToggle");
    const sidebarOverlay = document.getElementById("sidebarOverlay");

    function openSidebar() {
      sidebar.classList.add("open");
      sidebarToggle.classList.add("active");
      sidebarOverlay.classList.add("show");
    }

    function closeSidebar() {
      sidebar.classList.remove("open");
      sidebarToggle.classList.remove("active");
      sidebarOverlay.classList.remove("show");
    }

    sidebarToggle.addEventListener("click", () => {
      if (sidebar.classList.contains("open")) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });

    sidebarOverlay.addEventListener("click", closeSidebar);

    // Close sidebar on Escape key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && sidebar.classList.contains("open")) {
        closeSidebar();
      }
    });
  </script>
</body>
</html>
